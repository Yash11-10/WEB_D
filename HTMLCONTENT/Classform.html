<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        body {
            background-color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
        }

        .section1 {
            background-color: #1a4d9e;
            color: white;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .text {
            font-size: 25px;
            margin-bottom: 30px;
        }

        .button {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background-color: white;
            color: #1a4d9e;
            border: none;
            padding: 10px 30px;
            font-size: 1em;
            border-radius: 25px;
            font-weight: bold;
            min-width: 120px;
        }

        .section2 {
            background-color: #1a4d9e;
            color: white;
            padding: 40px 25px;
            border-radius: 8px;
        }

        .title {
            color: white;
            text-align: left;
            margin-bottom: 25px;
            font-size: 1.2em;
            border-bottom: 2px solid white;
            padding-bottom: 8px;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .boxes {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            color: #333;
        }

        .half {
            width: 50%;
        }

        .full {
            width: 100%;
        }
        .submit-btn {
            background-color: #3c78d8;
            color: white;
            border: none;
            padding: 10px 45px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 4px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="section1">
            <p class="text">Are you a student or Teacher</p>
            <div class="button">
                <button class="btn">Teacher</button>
                <button class="btn">Student</button>
            </div>
        </div>
        <div class="section2">
            <h3 class="title">REGISTRATION</h3>
            <form>
                <div class="row">
                    <input type="text" placeholder="First Name" class="boxes half">
                    <input type="text" placeholder="Last Name" class="boxes half">
                </div>
                <input type="email" placeholder="Email" class="boxes full">
                <input type="text" placeholder="Faculty" class="boxes full">
                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
