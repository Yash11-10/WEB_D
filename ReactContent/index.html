You can break the UI into small reusable pieces called Components.
Example: Button, Navbar, Card → all can be separate components.

Only the changed part of the page updates automatically (thanks to the Virtual DOM).

Makes your website/app super fast and organized.

Used in real-world apps like Instagram, Facebook, Netflix, WhatsApp Web. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            /* upar-niche layout */
            align-items: center;
            /* horizontally center elements inside */
            background-color: red;
            padding: 20px;
            border-radius: 10px;

        }
    </style>
</head>

<body>

    <div class="container">
        <div id="counter">0</div>
        <button id="btn">Click Here</button>
    </div>
    <script>
        document.getElementById("btn").addEventListener("click", () => {
            let num = parseInt(document.getElementById("counter").innerHTML)
            document.getElementById("counter").innerHTML = num + 1;
        })
    </script>

</body>

</html>
